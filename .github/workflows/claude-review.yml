name: Claude PR Review

on:
  pull_request:
    types: [opened]

jobs:
  review:
    # Only review PRs from branches in this repo (skips forks and bots' external PRs).
    # Public repo: this prevents drive-by PRs from consuming subscription quota.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/review"
