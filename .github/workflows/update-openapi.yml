name: Update OpenAPI Spec

on:
  schedule:
    # Run once a week at midnight on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual triggering from the GitHub UI

jobs:
  update-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Save current spec
        run: cp openapi-spec.json /tmp/old-spec.json

      - name: Fetch latest OpenAPI spec
        run: curl -s https://intervals.icu/api/v1/docs > openapi-spec.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate diff and impact scan
        run: |
          python .github/scripts/openapi_diff.py \
            /tmp/old-spec.json openapi-spec.json src \
            > /tmp/pr-body.md

      - name: Check for changes and create PR
        uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          commit-message: "chore: update intervals.icu OpenAPI specification"
          title: "chore: update intervals.icu OpenAPI specification"
          body-path: /tmp/pr-body.md
          branch: "update-openapi-spec"
          delete-branch: true
