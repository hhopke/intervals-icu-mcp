name: Update OpenAPI Spec

on:
  schedule:
    # Run once a week at midnight on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual triggering from the GitHub UI

jobs:
  update-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest OpenAPI spec
        run: |
          curl -s https://intervals.icu/api/v1/docs > openapi-spec.json

      - name: Check for changes and create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update intervals.icu OpenAPI specification"
          title: "chore: update intervals.icu OpenAPI specification"
          body: |
            Automated PR to update the `openapi-spec.json` from the latest Intervals.icu API.
            
            This ensures that our MCP tools are developed against the most recent API types.
          branch: "update-openapi-spec"
          delete-branch: true
